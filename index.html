<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie's Day Out</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* The Pool */
        .pool {
            position: relative;
            width: 80vw;
            height: 60vh;
            background: #4cc9f0;
            border: 12px solid #caf0f8;
            border-radius: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1), inset 0 0 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Water Ripples */
        .pool::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 40px,
                rgba(255, 255, 255, 0.1) 40px,
                rgba(255, 255, 255, 0.1) 80px
            );
            animation: wave 10s linear infinite;
        }

        @keyframes wave {
            from { background-position: 0 0; }
            to { background-position: 400px 0; }
        }

        /* The Duck */
        #duck {
            position: absolute;
            font-size: 50px;
            user-select: none;
            transition: transform 0.2s ease-out;
            z-index: 10;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
            cursor: pointer;
        }

        /* Floating Bobbing Effect */
        .bobbing {
            animation: bob 2s ease-in-out infinite;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .ui {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
        }

        h1 { color: #0077b6; margin-bottom: 5px; }
        p { color: #48cae4; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>Duckie Pool</h1>
        <p>Watch him go!</p>
    </div>

    <div class="pool" id="pool">
        <div id="duck" class="bobbing">🦆</div>
    </div>

    <script>
        const duck = document.getElementById('duck');
        const pool = document.getElementById('pool');

        let posX = pool.clientWidth / 2;
        let posY = pool.clientHeight / 2;
        let velX = 2;
        let velY = 1.5;

        function moveDuck() {
            const poolRect = pool.getBoundingClientRect();
            const duckRect = duck.getBoundingClientRect();

            // Update position
            posX += velX;
            posY += velY;

            // Bounce off walls
            if (posX + duckRect.width >= pool.clientWidth || posX <= 0) {
                velX *= -1;
                // Flip the duck emoji based on direction
                duck.style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            }
            if (posY + duckRect.height >= pool.clientHeight || posY <= 0) {
                velY *= -1;
            }

            duck.style.left = posX + 'px';
            duck.style.top = posY + 'px';

            requestAnimationFrame(moveDuck);
        }

        // Randomize speed every few seconds to look more "alive"
        setInterval(() => {
            velX += (Math.random() - 0.5) * 1;
            velY += (Math.random() - 0.5) * 1;
            
            // Speed limiters
            velX = Math.max(Math.min(velX, 4), -4);
            velY = Math.max(Math.min(velY, 4), -4);
        }, 3000);

        moveDuck();
    </script>
</body>
</html>
